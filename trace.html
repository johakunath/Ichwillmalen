<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ece4d6">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="styles.css">
<script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
<title>Trace It</title>
<style>
  html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none;touch-action:none}
  #stage{position:fixed;inset:0;touch-action:none}
  #pad{position:absolute;left:0;top:0;display:block}
  /* gentle "done" badge — calm, no confetti */
  #done{position:fixed;left:50%;top:18%;transform:translate(-50%,-6px);z-index:25;
        background:#fffffff2;border:1px solid var(--line);border-radius:999px;
        padding:10px 18px;font:800 18px var(--font);color:var(--ink-trace,#4f9b86);
        box-shadow:var(--sh-2);display:flex;align-items:center;gap:8px;
        opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}
  #done.show{opacity:1;transform:translate(-50%,0)}
  #colors{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .swatch{width:42px;height:42px;border-radius:50%;border:2px solid #00000010;cursor:pointer;flex:0 0 auto;transition:transform .08s}
  .swatch.on{transform:scale(1.16);box-shadow:0 0 0 3px var(--bar),0 0 0 5px var(--ink)}
</style>
</head>
<body>
<a id="back" href="index.html">← Menu</a>
<div id="stage"><canvas id="pad"></canvas></div>
<div id="done">✓ <span>Well done!</span></div>

<div class="bar">
  <div class="btn" id="cLines"><span>➖</span><span class="lbl">Lines</span></div>
  <div class="btn" id="cCurves"><span>〰️</span><span class="lbl">Curves</span></div>
  <div class="btn" id="cShapes"><span>⭐</span><span class="lbl">Shapes</span></div>
  <div class="btn" id="cAbc"><span>🔤</span><span class="lbl">ABC</span></div>
  <div class="group" id="colors"></div>
  <div class="btn" id="bClear"><span>⟲</span><span class="lbl">Again</span></div>
  <div class="btn" id="bNew"><span>➡️</span><span class="lbl">Next</span></div>
</div>

<script>
(function(){
  "use strict";

  var PAPER="#fffdf8";
  var cv=document.getElementById("pad"), ctx=cv.getContext("2d",{alpha:false});
  var stage=document.getElementById("stage");
  var DPR=Math.min(window.devicePixelRatio||1,2);

  /* layout box: a centred square the path is mapped into */
  var W=0,H=0,side=0,ox=0,oy=0;
  function layout(){
    W=window.innerWidth; H=window.innerHeight;
    cv.style.width=W+"px"; cv.style.height=H+"px";
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    side=Math.min(W-40, H-150)*0.86; if(side<160) side=Math.max(120,Math.min(W-24,H-150));
    ox=(W-side)/2; oy=(H-150-side)/2+20; if(oy<40) oy=40;
    render();
  }
  function PX(p){ return {x:ox+p[0]*side, y:oy+p[1]*side}; }
  function toBox(cx,cy){ return {x:(cx-ox)/side, y:(cy-oy)/side}; }

  /* ---------- path generators (normalised 0..1 inside the box) ---------- */
  function densify(poly,step){
    step=step||0.02; var out=[],i,a,b,d,n,t,j;
    for(i=0;i<poly.length-1;i++){ a=poly[i]; b=poly[i+1]; d=Math.hypot(b[0]-a[0],b[1]-a[1]);
      n=Math.max(1,Math.ceil(d/step));
      for(j=0;j<n;j++){ t=j/n; out.push([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]); } }
    out.push(poly[poly.length-1]); return out;
  }
  function fn(f,a,b,n){ var out=[],i,t; n=n||60; for(i=0;i<=n;i++){ t=a+(b-a)*i/n; out.push(f(t)); } return out; }
  function poly(sub){ return {sub:sub.map(function(s){return densify(s);})}; }

  var GEN={
    Lines:[
      function(){ return poly([[[0.1,0.5],[0.9,0.5]]]); },                      // straight
      function(){ return poly([[[0.12,0.85],[0.88,0.15]]]); },                  // diagonal up
      function(){ return poly([[[0.12,0.15],[0.88,0.85]]]); },                  // diagonal down
      function(){ return poly([[[0.5,0.1],[0.5,0.9]]]); },                      // vertical
      function(){ return poly([[[0.1,0.7],[0.4,0.4],[0.6,0.6],[0.9,0.3]]]); }   // gentle hills
    ],
    Curves:[
      function(){ return {sub:[fn(function(t){return [t,0.5-0.32*Math.sin(t*6.2832)];},0.08,0.92)]}; }, // wave
      function(){ return {sub:[fn(function(t){return [0.5+0.36*Math.cos(t),0.5+0.36*Math.sin(t)];},0.5,6.0)]}; }, // arc
      function(){ return {sub:[fn(function(t){var r=0.06+0.052*t;return [0.5+r*Math.cos(t),0.5+r*Math.sin(t)];},0,12.0)]}; }, // spiral
      function(){ return {sub:[fn(function(t){return [0.15+0.7*(t/6.2832),0.5-0.3*Math.sin(t)];},0,6.2832)]}; }, // s-curve
      function(){ return {sub:[fn(function(t){return [0.5+0.3*Math.sin(2*t),0.5+0.3*Math.sin(t)];},0,6.2832)]}; } // loop
    ],
    Shapes:[
      function(){ return {sub:[fn(function(t){return [0.5+0.36*Math.cos(t),0.5+0.36*Math.sin(t)];},0,6.2832)]}; }, // circle
      function(){ return poly([[[0.18,0.18],[0.82,0.18],[0.82,0.82],[0.18,0.82],[0.18,0.18]]]); }, // square
      function(){ return poly([[[0.5,0.14],[0.86,0.84],[0.14,0.84],[0.5,0.14]]]); }, // triangle
      function(){ return poly([[[0.1,0.4],[0.3,0.7],[0.5,0.3],[0.7,0.7],[0.9,0.4]]]); }, // zigzag
      function(){ var p=[],i,a,r; for(i=0;i<=10;i++){ a=-Math.PI/2+i*Math.PI/5; r=(i%2===0)?0.4:0.17; p.push([0.5+r*Math.cos(a),0.5+r*Math.sin(a)]); } return poly([p]); }, // star
      function(){ return {sub:[fn(function(t){var x=16*Math.pow(Math.sin(t),3); var y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t); return [0.5+x/40,0.46-y/40];},0,6.2832)]}; } // heart
    ],
    ABC:[
      function(){ return poly([[[0.32,0.16],[0.32,0.84],[0.7,0.84]]]); },                               // L
      function(){ return poly([[[0.2,0.18],[0.8,0.18]],[[0.5,0.18],[0.5,0.84]]]); },                    // T
      function(){ return poly([[[0.5,0.16],[0.5,0.84]]]); },                                            // I
      function(){ return {sub:[fn(function(t){return [0.5+0.32*Math.cos(t),0.5+0.34*Math.sin(t)];},0,6.2832)]}; }, // O
      function(){ return {sub:[fn(function(t){return [0.5+0.32*Math.cos(t),0.5+0.34*Math.sin(t)];},0.9,5.4)]}; },  // C
      function(){ return poly([[[0.22,0.18],[0.5,0.84],[0.78,0.18]]]); },                               // V
      function(){ return poly([[[0.24,0.16],[0.24,0.62]],[[0.24,0.62]]].concat([[ [0.24,0.62] ]])); },  // (placeholder, replaced below)
      function(){ return poly([[[0.22,0.84],[0.5,0.16],[0.78,0.84]],[[0.34,0.55],[0.66,0.55]]]); }      // A
    ]
  };
  // fix the U entry (multi-point curve) cleanly
  GEN.ABC[6]=function(){ return {sub:[ densify([[0.26,0.16],[0.26,0.6]]).concat(
      fn(function(t){return [0.5+0.24*Math.cos(t),0.6+0.24*Math.sin(t)];},Math.PI,2*Math.PI),
      densify([[0.74,0.6],[0.74,0.16]]) ) ]}; }; // U

  /* ---------- state ---------- */
  var cat="Shapes", queue=[], qi=0, path=null, points=[], visited=[], total=0, done=false;
  var strokes=[], cur=null;
  var color="#4361ee";
  var COLORS=["#4361ee","#e23b3b","#2aa39a","#9b5de5","#ff9f1c","#2b2b2b"];

  var elC=document.getElementById("colors");
  COLORS.forEach(function(c,i){
    var s=document.createElement("div"); s.className="swatch"+(i===0?" on":""); s.style.background=c;
    s.addEventListener("click",function(){ color=c;
      var all=elC.querySelectorAll(".swatch"); for(var k=0;k<all.length;k++) all[k].classList.remove("on"); s.classList.add("on"); });
    elC.appendChild(s);
  });

  function shuffle(a){ var i,j,t; for(i=a.length-1;i>0;i--){ j=(Math.random()*(i+1))|0; t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function setCat(c){
    cat=c; queue=GEN[c].map(function(_,i){return i;}); shuffle(queue); qi=0;
    ["cLines","cCurves","cShapes","cAbc"].forEach(function(id){ document.getElementById(id).classList.remove("on"); });
    document.getElementById({Lines:"cLines",Curves:"cCurves",Shapes:"cShapes",ABC:"cAbc"}[c]).classList.add("on");
    loadPath();
  }
  function loadPath(){
    path=GEN[cat][queue[qi]]();
    points=[]; path.sub.forEach(function(s){ s.forEach(function(p){ points.push(p); }); });
    visited=points.map(function(){return false;}); total=points.length;
    strokes=[]; cur=null; done=false; hideDone(); render();
  }
  function nextPath(){ qi=(qi+1)%queue.length; if(qi===0) shuffle(queue); loadPath(); }

  /* ---------- drawing ---------- */
  function render(){
    ctx.fillStyle=PAPER; ctx.fillRect(0,0,W,H);
    if(!path) return;
    // guide: dotted light line, or solid colour once done
    ctx.lineCap="round"; ctx.lineJoin="round";
    path.sub.forEach(function(s){
      ctx.beginPath();
      s.forEach(function(p,i){ var q=PX(p); if(i===0)ctx.moveTo(q.x,q.y); else ctx.lineTo(q.x,q.y); });
      if(done){ ctx.setLineDash([]); ctx.lineWidth=18; ctx.strokeStyle=color; ctx.globalAlpha=0.9; ctx.stroke(); ctx.globalAlpha=1; }
      else { ctx.setLineDash([2,16]); ctx.lineWidth=16; ctx.strokeStyle="#cfc8ba"; ctx.stroke(); ctx.setLineDash([]); }
    });
    // start dot + arrow (only while tracing)
    if(!done){
      var a=PX(path.sub[0][0]), b=PX(path.sub[0][Math.min(6,path.sub[0].length-1)]);
      ctx.fillStyle="#6cb257"; ctx.beginPath(); ctx.arc(a.x,a.y,14,0,6.2832); ctx.fill();
      ctx.fillStyle="#fff"; ctx.font="700 16px "+getFont(); ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("▶",a.x,a.y);
      void b;
    }
    // child strokes
    strokes.concat(cur?[cur]:[]).forEach(function(st){ drawStroke(st); });
  }
  function getFont(){ return getComputedStyle(document.body).fontFamily||"sans-serif"; }
  function drawStroke(st){
    if(st.pts.length<1) return;
    ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle=st.color; ctx.lineWidth=14;
    ctx.beginPath();
    st.pts.forEach(function(p,i){ var q=PX(p); if(i===0)ctx.moveTo(q.x,q.y); else ctx.lineTo(q.x,q.y); });
    if(st.pts.length===1){ var q=PX(st.pts[0]); ctx.arc(q.x,q.y,7,0,6.2832); ctx.fillStyle=st.color; ctx.fill(); }
    else ctx.stroke();
  }

  var TOL=0.07;
  function mark(p){
    var i,d,changed=false;
    for(i=0;i<points.length;i++){ if(!visited[i]){ d=Math.hypot(points[i][0]-p.x,points[i][1]-p.y); if(d<TOL){ visited[i]=true; changed=true; } } }
    if(changed && !done){ var c=0; for(i=0;i<visited.length;i++) if(visited[i])c++; if(c/total>=0.8) finish(); }
  }
  function finish(){ done=true; render(); showDone(); }

  var doneEl=document.getElementById("done"), doneT;
  function showDone(){ doneEl.classList.add("show"); clearTimeout(doneT); doneT=setTimeout(function(){ doneEl.classList.remove("show"); },1800); }
  function hideDone(){ doneEl.classList.remove("show"); }

  /* ---------- input: one pointer at a time, pen takes priority over touch ---------- */
  var activeId=null, penDown=false;
  stage.addEventListener("pointerdown",function(e){
    if(e.pointerType!=="pen" && penDown) return;        // palm rejection
    if(activeId!==null) return;
    if(e.pointerType==="pen") penDown=true;
    activeId=e.pointerId; try{ stage.setPointerCapture(e.pointerId); }catch(_){}
    var p=toBox(e.clientX,e.clientY); cur={color:color,pts:[p]}; mark(p); render(); e.preventDefault();
  });
  stage.addEventListener("pointermove",function(e){
    if(e.pointerId!==activeId||!cur) return;
    var evs=(e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e],i;
    for(i=0;i<evs.length;i++){ var p=toBox(evs[i].clientX,evs[i].clientY); cur.pts.push(p); mark(p); }
    render(); e.preventDefault();
  });
  function end(e){ if(e.pointerId!==activeId) return; if(cur){ strokes.push(cur); cur=null; } activeId=null; if(e.pointerType==="pen") penDown=false; render(); }
  stage.addEventListener("pointerup",end); stage.addEventListener("pointercancel",end);

  document.getElementById("cLines").addEventListener("click",function(){ setCat("Lines"); });
  document.getElementById("cCurves").addEventListener("click",function(){ setCat("Curves"); });
  document.getElementById("cShapes").addEventListener("click",function(){ setCat("Shapes"); });
  document.getElementById("cAbc").addEventListener("click",function(){ setCat("ABC"); });
  document.getElementById("bClear").addEventListener("click",function(){ strokes=[]; cur=null; visited=points.map(function(){return false;}); done=false; hideDone(); render(); });
  document.getElementById("bNew").addEventListener("click",nextPath);

  document.addEventListener("contextmenu",function(e){ e.preventDefault(); });
  document.addEventListener("gesturestart",function(e){ e.preventDefault(); });
  window.addEventListener("resize",function(){ clearTimeout(window._r); window._r=setTimeout(layout,120); });

  layout(); setCat("Shapes");
})();
</script>
</body>
</html>
