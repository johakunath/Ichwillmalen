<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ece4d6">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="styles.css">
<script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
<title>Coloring Book</title>
<style>
  html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none;touch-action:none}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:14px 14px 130px}
  #art{max-width:100%;max-height:100%;background:#fff;border-radius:14px;box-shadow:var(--sh-3);
       touch-action:none;cursor:pointer}
</style>
</head>
<body>
<a id="back" href="index.html">← Menu</a>
<div id="stage"><canvas id="art"></canvas></div>
<div id="msg"></div>

<div class="bar">
  <div class="btn" id="bPick"><span>🖼️</span><span class="lbl">Pictures</span></div>
  <div class="sep"></div>
  <div id="palette" style="display:flex;gap:8px"></div>
  <div class="sep"></div>
  <div class="btn" id="bClear"><span>🧼</span><span class="lbl">Reset</span></div>
</div>

<div class="overlay" id="ask"><div class="sheet"><h2>Start this picture over?</h2><p>This clears the colors you added.</p><div class="row"><button class="keep" id="askKeep">Keep it</button><button class="wipe" id="askWipe">Start over</button></div></div></div>

<div id="pick"><div id="pickTop"><h2>Pictures</h2><a class="pback" href="index.html">← Menu</a><button id="pickClose" style="display:none">Close</button></div><div id="pickFilter"></div><div id="pickGrid"></div></div>

<script src="gallery.js"></script>
<script>
(function(){
  "use strict";
  // Tap-to-fill coloring on a canvas: any line-art image (PNG or SVG) is drawn to
  // the canvas, and a tap flood-fills the area you touched, bounded by the dark
  // outlines. Same "tap a part to fill it" feel as before, but it works with real
  // illustrated coloring pages, not just tagged vector regions.
  var COLORS=["#2b2b2b","#e23b3b","#ff7a45","#ffc83d","#8ac926","#2aa39a","#4cc9f0","#4361ee","#9b5de5","#f15bb5","#c98a5e","#ffffff"];
  var stage=document.getElementById("stage");
  var cv=document.getElementById("art"), ctx=cv.getContext("2d",{willReadFrequently:true});
  var color=COLORS[1], iw=0, ih=0, src=null, idata=null;

  var pal=document.getElementById("palette");
  COLORS.forEach(function(c,i){ var s=document.createElement("div"); s.className="sw"+(i===1?" on":""); s.style.background=c;
    s.addEventListener("click",function(){ color=c; var all=pal.querySelectorAll(".sw"); for(var k=0;k<all.length;k++) all[k].classList.remove("on"); s.classList.add("on"); }); pal.appendChild(s); });

  function showMsg(t){ var m=document.getElementById("msg"); m.textContent=t; m.style.display="flex"; }

  function fitDisplay(){
    if(!iw) return;
    var maxW=window.innerWidth-24, maxH=window.innerHeight-150;
    var s=Math.min(maxW/iw, maxH/ih);
    cv.style.width=Math.round(iw*s)+"px"; cv.style.height=Math.round(ih*s)+"px";
  }
  window.addEventListener("resize",function(){ clearTimeout(window._r); window._r=setTimeout(fitDisplay,120); });

  function loadFile(file){
    var im=new Image(); im.crossOrigin="anonymous";
    im.onload=function(){
      // render at ~900px on the long edge: crisp for big PNGs, sharp upscale for small vector SVGs
      var nw=im.naturalWidth||im.width||400, nh=im.naturalHeight||im.height||300;
      var sc=900/Math.max(nw,nh); iw=Math.max(1,Math.round(nw*sc)); ih=Math.max(1,Math.round(nh*sc));
      cv.width=iw; cv.height=ih;
      src=document.createElement("canvas"); src.width=iw; src.height=ih;
      var sx=src.getContext("2d"); sx.fillStyle="#ffffff"; sx.fillRect(0,0,iw,ih); sx.drawImage(im,0,0,iw,ih);
      reset(); fitDisplay();
    };
    im.onerror=function(){ showMsg("Could not load that picture."); };
    im.src=file;
  }
  function reset(){ if(!src) return; ctx.drawImage(src,0,0); idata=null; }

  function hex(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

  function fillAt(px,py){
    if(!src) return;
    if(px<0||py<0||px>=iw||py>=ih) return;
    if(!idata) idata=ctx.getImageData(0,0,iw,ih);
    var d=idata.data, W=iw, H=ih;
    var si=(py*W+px)*4, sr=d[si], sg=d[si+1], sb=d[si+2];
    // don't start on (or recolour) an outline
    if(sr*0.299+sg*0.587+sb*0.114 < 110) return;
    var f=hex(color), fr=f[0], fg=f[1], fb=f[2];
    if(sr===fr&&sg===fg&&sb===fb) return;          // already this colour
    var tol=48;
    function ok(i){
      if(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114 < 110) return false;   // dark outline = boundary
      return Math.abs(d[i]-sr)<=tol && Math.abs(d[i+1]-sg)<=tol && Math.abs(d[i+2]-sb)<=tol;
    }
    // scanline flood fill (mutating to the fill colour marks pixels visited)
    var stack=[px,py];
    while(stack.length){
      var y=stack.pop(), x=stack.pop();
      var lx=x; while(lx>=0 && ok((y*W+lx)*4)) lx--; lx++;
      var up=false, dn=false;
      for(var rx=lx; rx<W && ok((y*W+rx)*4); rx++){
        var ii=(y*W+rx)*4; d[ii]=fr; d[ii+1]=fg; d[ii+2]=fb; d[ii+3]=255;
        if(y>0){ if(ok(((y-1)*W+rx)*4)){ if(!up){ stack.push(rx,y-1); up=true; } } else up=false; }
        if(y<H-1){ if(ok(((y+1)*W+rx)*4)){ if(!dn){ stack.push(rx,y+1); dn=true; } } else dn=false; }
      }
    }
    ctx.putImageData(idata,0,0);
  }

  function tap(clientX,clientY){
    if(!src) return;
    var r=cv.getBoundingClientRect();
    var px=Math.floor((clientX-r.left)/r.width*iw), py=Math.floor((clientY-r.top)/r.height*ih);
    fillAt(px,py);
  }
  cv.addEventListener("pointerdown",function(e){ tap(e.clientX,e.clientY); e.preventDefault(); });

  // Reset is guarded so a toddler can't wipe the page with a stray tap.
  function show(id){ document.getElementById(id).classList.add("show"); }
  function hide(id){ document.getElementById(id).classList.remove("show"); }
  document.getElementById("bClear").addEventListener("click",function(){ if(src) show("ask"); });
  document.getElementById("askKeep").addEventListener("click",function(){ hide("ask"); });
  document.getElementById("askWipe").addEventListener("click",function(){ reset(); hide("ask"); });

  document.getElementById("bPick").addEventListener("click",function(){ Gallery.open(); });
  Gallery.init({
    key:"coloring", withLevels:true,
    onPick:function(it){ loadFile(it.file); },
    emptyMsg:"No coloring pages yet.",
    errorMsg:"Open this from GitHub Pages (or a local server) so pages can load."
  });
})();
</script>
</body>
</html>
